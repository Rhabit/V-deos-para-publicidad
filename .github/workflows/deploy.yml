name: Deploy galería a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar sitio (excluye .git y ficheros de dev)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude 'server.py' \
            --exclude 'start.sh' \
            --exclude 'tools' \
            ./ _site/
          touch _site/.nojekyll

      - name: Configurar Pages (habilita Pages si no lo está)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
