<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Móvil de notificaciones — editable</title>
<style>
  :root{ --bg:#0b0b0f; --surface:#15151b; --border:#2a2a33; --accent:#ff7a1a; --dim:#9aa0ad; --text:#fff; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px}
  h1{font-size:18px;font-weight:800;margin:4px 0 0}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .seg button{background:transparent;color:var(--dim);border:0;padding:8px 16px;font-weight:700;cursor:pointer}
  .seg button.on{background:var(--accent);color:#160c04}
  .clip{width:360px;max-width:92vw;display:flex;flex-direction:column;gap:12px}
  .clip__video{position:relative;background:#0c0806;border-radius:22px;overflow:hidden;border:1px solid var(--border)}
  .lock-canvas{display:block;width:100%;aspect-ratio:9/16;background:#0c0806}
  .lock-ctrl{display:flex;flex-direction:column;gap:9px}
  .lock-file{display:inline-flex;align-items:center;gap:8px;border:1px dashed var(--border);border-radius:10px;padding:9px 12px;color:var(--dim);cursor:pointer;font-size:13px;font-weight:600}
  .lock-file:hover{border-color:var(--accent);color:var(--accent)}
  .lock-file .ico{width:16px;height:16px}
  .lock-list{display:flex;flex-direction:column;gap:7px}
  .lock-row{display:flex;gap:7px;align-items:center}
  .lock-row input{background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px 11px;font-size:13px;min-width:0}
  .lock-row input:focus{outline:none;border-color:var(--accent)}
  .lock-row .lock-app{width:90px;flex:none}
  .lock-row .lock-text{flex:1}
  .lock-del{width:38px;height:38px;flex:none;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--dim);cursor:pointer;display:grid;place-items:center}
  .lock-del:hover{border-color:#a33;color:#ff6b5a}
  .lock-del .ico{width:16px;height:16px}
  .lock-add{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px dashed var(--border);border-radius:10px;padding:10px;background:transparent;color:var(--accent);cursor:pointer;font-weight:700;font-size:13px}
  .lock-add:hover{border-color:var(--accent)}
  .lock-add .ico{width:15px;height:15px}
  .lock-ico{flex:none;width:38px;height:38px;border-radius:9px;overflow:hidden;cursor:pointer;border:1px solid var(--border);background:#140f0b}
  .lock-ico:hover{border-color:var(--accent)}
  .lock-ico__img{display:grid;place-items:center;width:100%;height:100%;background-size:cover;background-position:center}
  .lock-move{display:flex;flex-direction:column;gap:2px;flex:none}
  .lock-mv{width:24px;height:18px;padding:0;border:1px solid var(--border);border-radius:6px;background:#140f0b;color:var(--dim);cursor:pointer;font-size:10px;line-height:1;display:grid;place-items:center}
  .lock-mv:hover{border-color:var(--accent);color:var(--accent)}
  .ico{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .btn{border:0;border-radius:12px;background:var(--accent);color:#160c04;font-weight:800;padding:12px 20px;cursor:pointer}
  .hint{color:var(--dim);font-size:12px;max-width:360px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="i-trash" viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M9 7V5h6v2"/><path d="M6 7l1 13h10l1-13"/></symbol>
  <symbol id="i-image" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2.5"/><circle cx="8.5" cy="9.5" r="1.8"/><path d="M4 17l5-5 4 4 3-3 4 4"/></symbol>
  <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
  <symbol id="i-download" viewBox="0 0 24 24"><path d="M12 4v11"/><path d="M8 11l4 4 4-4"/><path d="M5 19h14"/></symbol>
</svg>

<h1>Móvil de notificaciones</h1>
<div class="seg" id="mk-lang">
  <button type="button" data-lang="es" class="on">ES</button>
  <button type="button" data-lang="en">EN</button>
</div>

<article class="clip">
  <div class="clip__video"><canvas id="lock-canvas" class="lock-canvas"></canvas></div>
  <div class="lock-ctrl">
    <label class="lock-file"><svg class="ico"><use href="#i-image"/></svg> Fondo de pantalla<input type="file" id="lock-wall" accept="image/*" hidden></label>
    <div class="lock-list" id="lock-list"></div>
    <button type="button" class="lock-add" id="lock-add"><svg class="ico"><use href="#i-plus"/></svg> Añadir notificación</button>
  </div>
  <button class="btn" id="dl" type="button"><svg class="ico" style="width:16px;height:16px;vertical-align:-3px"><use href="#i-download"/></svg> Descargar vídeo</button>
</article>
<p class="hint">Pasa el cursor por encima del móvil para reproducir. Edita cada notificación (app, texto, icono), sube un fondo y descarga el vídeo. Todo está en este único archivo — modifícalo a tu gusto.</p>

<script>
/* Pantalla de bloqueo: mockup en CANVAS (fondo + reloj + notificaciones que
   "acaban de llegar"). Editable en vivo: textos de notificaciones, añadir/quitar
   y subir fondo. Descarga capturando el canvas (MediaRecorder). */
(function initLockScreen() {
  const canvas = document.getElementById("lock-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = 1080, H = 1920, CYCLE = 6.0;
  canvas.width = W; canvas.height = H;
  const FONT = 'system-ui, -apple-system, "Segoe UI", Inter, Roboto, sans-serif';
  // Posicionamiento de notificaciones: arrastrables en vertical, con margen inferior neutro.
  const NTOP = 660, NBOTTOM = 220, NGAP = 26;

  const langNow = () => {
    const on = document.querySelector("#mk-lang button.on");
    return on && on.dataset.lang === "en" ? "en" : "es";
  };
  const DEF = { es: "¡Es hora de tu hábito de hoy! 💪", en: "Time for today's habit! 💪" };
  const NOW = { es: "ahora", en: "now" };

  const rhabitIcon = new Image(); rhabitIcon.src = RHABIT_ICON;
  let wallpaper = null;
  let notifs = [{ app: "Rhabit", text: DEF[langNow()], color: "#ff7a1a", icon: rhabitIcon, iconSrc: RHABIT_ICON }];
  let untouched = true;
  let start = performance.now();
  const restart = () => { start = performance.now(); };
  const ease = (k) => 1 - Math.pow(1 - k, 3);

  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
  }
  function wrapLines(text, maxW) {
    const words = String(text).split(/\s+/); const lines = []; let line = "";
    for (const w of words) { const test = line ? line + " " + w : w; if (ctx.measureText(test).width > maxW && line) { lines.push(line); line = w; } else line = test; }
    if (line) lines.push(line);
    return lines.length ? lines : [""];
  }

  function drawWallpaper() {
    if (wallpaper && wallpaper.complete && wallpaper.naturalWidth) {
      const ar = wallpaper.naturalWidth / wallpaper.naturalHeight, car = W / H;
      let dw, dh, dx, dy;
      if (ar > car) { dh = H; dw = H * ar; dx = (W - dw) / 2; dy = 0; } else { dw = W; dh = W / ar; dx = 0; dy = (H - dh) / 2; }
      ctx.drawImage(wallpaper, dx, dy, dw, dh);
    } else {
      // Fondo por defecto: gradiente abstracto tipo fondo de móvil típico.
      const g = ctx.createLinearGradient(0, 0, W, H);
      g.addColorStop(0, "#1f2b7a"); g.addColorStop(0.5, "#6a2f9c"); g.addColorStop(1, "#c33a76");
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
      const glow = (cx, cy, r, col) => {
        const rg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        rg.addColorStop(0, col); rg.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
      };
      glow(W * 0.82, H * 0.14, 740, "rgba(255,170,90,0.5)");
      glow(W * 0.12, H * 0.72, 840, "rgba(70,210,205,0.32)");
    }
    const og = ctx.createLinearGradient(0, 0, 0, H);
    og.addColorStop(0, "rgba(0,0,0,0.42)"); og.addColorStop(0.32, "rgba(0,0,0,0.04)");
    og.addColorStop(0.6, "rgba(0,0,0,0.04)"); og.addColorStop(1, "rgba(0,0,0,0.5)");
    ctx.fillStyle = og; ctx.fillRect(0, 0, W, H);
  }
  function dateStr(d) {
    const daysEs = ["domingo", "lunes", "martes", "miércoles", "jueves", "viernes", "sábado"];
    const monEs = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
    const daysEn = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const monEn = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    if (langNow() === "en") return `${daysEn[d.getDay()]}, ${monEn[d.getMonth()]} ${d.getDate()}`;
    const s = `${daysEs[d.getDay()]}, ${d.getDate()} de ${monEs[d.getMonth()]}`;
    return s.charAt(0).toUpperCase() + s.slice(1);
  }
  function drawClock() {
    const now = new Date();
    const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2, "0")}`;
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,255,255,0.92)"; ctx.font = `600 44px ${FONT}`;
    ctx.fillText(dateStr(now), W / 2, 248);
    ctx.fillStyle = "#fff"; ctx.font = `600 340px ${FONT}`;
    ctx.fillText(time, W / 2, 580);
  }
  function notifHeight(n, fs) {
    fs = fs || 1;
    ctx.font = `500 ${36 * fs}px ${FONT}`;
    const tx = 28 * fs + 76 * fs + 24 * fs;
    const lines = wrapLines(n.text, (W - 2 * 48) - tx - 36 * fs);
    return Math.max(128 * fs, 62 * fs + lines.length * 46 * fs + 30 * fs);
  }
  function drawNotif(x, y, w, h, n, op, fs) {
    fs = fs || 1;
    ctx.save(); ctx.globalAlpha = op;
    roundRect(x, y, w, h, 38 * fs); ctx.fillStyle = "rgba(30,30,34,0.62)"; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = "rgba(255,255,255,0.10)"; ctx.stroke();
    const ic = 76 * fs, ix = x + 28 * fs, iy = y + 28 * fs;
    roundRect(ix, iy, ic, ic, 20 * fs);
    const iconImg = (n.icon && n.icon.complete && n.icon.naturalWidth) ? n.icon : rhabitIcon;
    if (iconImg.complete && iconImg.naturalWidth) {
      ctx.save(); ctx.clip();
      const img = iconImg, ar = img.naturalWidth / img.naturalHeight;
      let dw, dh, dx, dy;
      if (ar > 1) { dh = ic; dw = ic * ar; dx = ix - (dw - ic) / 2; dy = iy; }
      else { dw = ic; dh = ic / ar; dx = ix; dy = iy - (dh - ic) / 2; }
      ctx.drawImage(img, dx, dy, dw, dh);
      ctx.restore();
    } else {
      ctx.fillStyle = n.color || "#ff7a1a"; ctx.fill();
      ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = `800 ${42 * fs}px ${FONT}`;
      ctx.fillText(((n.app || "R").trim().charAt(0) || "R").toUpperCase(), ix + ic / 2, iy + ic / 2 + 15 * fs);
    }
    const tx = ix + ic + 24 * fs;
    ctx.textAlign = "left"; ctx.fillStyle = "rgba(235,235,240,0.72)"; ctx.font = `700 ${27 * fs}px ${FONT}`;
    ctx.fillText((n.app || "Rhabit").toUpperCase(), tx, y + 50 * fs);
    ctx.textAlign = "right"; ctx.fillStyle = "rgba(235,235,240,0.5)"; ctx.font = `500 ${27 * fs}px ${FONT}`;
    ctx.fillText(NOW[langNow()], x + w - 30 * fs, y + 50 * fs);
    ctx.textAlign = "left"; ctx.fillStyle = "#fff"; ctx.font = `500 ${36 * fs}px ${FONT}`;
    wrapLines(n.text, w - (tx - x) - 36 * fs).forEach((ln, i) => ctx.fillText(ln, tx, y + 98 * fs + i * 46 * fs));
    ctx.restore();
  }
  // Clamp del top de una notificación dentro de la zona útil (deja margen inferior).
  const clampY = (yTop, h) => Math.max(NTOP, Math.min(yTop, H - NBOTTOM - h));
  // Asigna posición por defecto (apiladas) a las notificaciones que aún no se han movido.
  function assignDefaultY() {
    let y = NTOP;
    notifs.forEach((n) => { const h = notifHeight(n, 1); if (n.y == null) n.y = y; y = Math.max(y, n.y) + h + NGAP; });
  }
  function drawNotifs(t) {
    const x = 48, w = W - 2 * 48;
    if (notifs.some((n) => n.y == null)) assignDefaultY();
    for (let i = 0; i < notifs.length; i++) {
      const n = notifs[i], h = notifHeight(n, 1), yTop = clampY(n.y, h);
      const appearAt = 0.35 + i * 0.30, fadeOut = CYCLE - 0.7;
      let op = 0, slide = 0;
      if (t >= appearAt) { const k = Math.min(1, (t - appearAt) / 0.5); op = k; slide = (1 - ease(k)) * 70; }
      if (t >= fadeOut) op *= Math.max(0, 1 - (t - fadeOut) / 0.6);
      if (op > 0.002) drawNotif(x, yTop - slide, w, h, n, op, 1);
    }
  }
  function render(t) { drawWallpaper(); drawClock(); drawNotifs(t); }
  let encoding = false, hover = false, drag = null;
  const DRAG_T = CYCLE * 0.5; // fotograma con todas las notificaciones visibles (para colocarlas)
  const clipEl = canvas.closest(".clip");
  if (clipEl) {
    clipEl.addEventListener("mouseenter", () => { hover = true; start = performance.now(); });
    clipEl.addEventListener("mouseleave", () => { if (!drag) { hover = false; render(0); } });
  }
  render(0); // fotograma inicial estático; solo se anima con el cursor encima
  function frame(now) {
    if (!encoding) { if (drag) render(DRAG_T); else if (hover) render(((now - start) / 1000) % CYCLE); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---- Arrastrar cada notificación a una posición vertical concreta ----
  canvas.style.touchAction = "none"; canvas.style.cursor = "grab";
  const toCanvas = (ev) => { const r = canvas.getBoundingClientRect(); return { x: (ev.clientX - r.left) * W / r.width, y: (ev.clientY - r.top) * H / r.height }; };
  function notifAt(px, py) {
    for (let i = notifs.length - 1; i >= 0; i--) {
      const n = notifs[i], h = notifHeight(n, 1), yTop = clampY(n.y == null ? NTOP : n.y, h);
      if (px >= 48 && px <= W - 48 && py >= yTop && py <= yTop + h) return { n, off: py - yTop };
    }
    return null;
  }
  canvas.addEventListener("pointerdown", (ev) => {
    const p = toCanvas(ev), hit = notifAt(p.x, p.y);
    if (!hit) return;
    drag = hit; hover = true; canvas.style.cursor = "grabbing";
    try { canvas.setPointerCapture(ev.pointerId); } catch (e) {}
    ev.preventDefault();
  });
  canvas.addEventListener("pointermove", (ev) => {
    if (!drag) return;
    const p = toCanvas(ev), h = notifHeight(drag.n, 1);
    drag.n.y = clampY(p.y - drag.off, h); untouched = false; ev.preventDefault();
  });
  const endDrag = () => { if (!drag) return; drag = null; canvas.style.cursor = "grab"; hover = true; start = performance.now(); };
  canvas.addEventListener("pointerup", endDrag);
  canvas.addEventListener("pointercancel", endDrag);

  // ---- Controles ----
  const listEl = document.getElementById("lock-list");
  const wallInput = document.getElementById("lock-wall");
  const addBtn = document.getElementById("lock-add");
  const esc = (s) => String(s).replace(/"/g, "&quot;");

  function renderList() {
    listEl.innerHTML = "";
    notifs.forEach((n, i) => {
      const row = document.createElement("div"); row.className = "lock-row";
      const src = n.iconSrc || RHABIT_ICON;
      row.innerHTML =
        `<label class="lock-ico" title="${langNow() === "en" ? "App icon" : "Icono de la app"}"><input type="file" accept="image/*" hidden>` +
        `<span class="lock-ico__img" style="background-image:url('${esc(src)}')"></span></label>` +
        `<input class="lock-app" placeholder="App" value="${esc(n.app)}">` +
        `<input class="lock-text" placeholder="${langNow() === "en" ? "Notification text" : "Texto de la notificación"}" value="${esc(n.text)}">` +
        `<div class="lock-move"><button class="lock-mv" data-d="-1" type="button" aria-label="Subir">▲</button><button class="lock-mv" data-d="1" type="button" aria-label="Bajar">▼</button></div>` +
        `<button class="lock-del" type="button" aria-label="Quitar"><svg class="ico"><use href="#i-trash"/></svg></button>`;
      const appI = row.querySelector(".lock-app"), txtI = row.querySelector(".lock-text");
      appI.addEventListener("input", () => { n.app = appI.value; untouched = false; });
      txtI.addEventListener("input", () => { n.text = txtI.value; untouched = false; });
      const iconInput = row.querySelector(".lock-ico input"), iconImg = row.querySelector(".lock-ico__img");
      iconInput.addEventListener("change", () => {
        const f = iconInput.files && iconInput.files[0]; if (!f) return;
        const url = URL.createObjectURL(f);
        const img = new Image();
        img.onload = () => { n.icon = img; n.iconSrc = url; iconImg.innerHTML = ""; iconImg.style.backgroundImage = `url('${url}')`; untouched = false; restart(); };
        img.src = url;
      });
      row.querySelectorAll(".lock-mv").forEach((b) => b.addEventListener("click", () => {
        const j = i + Number(b.dataset.d);
        if (j < 0 || j >= notifs.length) return;
        const tmp = notifs[i]; notifs[i] = notifs[j]; notifs[j] = tmp;
        untouched = false; renderList(); restart();
      }));
      row.querySelector(".lock-del").addEventListener("click", () => {
        notifs.splice(i, 1);
        if (!notifs.length) notifs.push({ app: "Rhabit", text: "", color: "#ff7a1a", icon: rhabitIcon, iconSrc: RHABIT_ICON });
        untouched = false; renderList(); restart();
      });
      listEl.appendChild(row);
    });
  }
  addBtn.addEventListener("click", () => {
    const colors = ["#ff7a1a", "#3fb6ff", "#22c55e", "#9b8cff", "#f472b6"];
    notifs.push({ app: "Rhabit", text: "", color: colors[notifs.length % colors.length], icon: rhabitIcon, iconSrc: RHABIT_ICON });
    untouched = false; renderList(); restart();
  });
  wallInput.addEventListener("change", () => {
    const f = wallInput.files && wallInput.files[0]; if (!f) return;
    const img = new Image();
    img.onload = () => { wallpaper = img; restart(); };
    img.src = URL.createObjectURL(f);
  });
  const langSeg = document.getElementById("mk-lang");
  if (langSeg) langSeg.addEventListener("click", () => setTimeout(() => {
    if (untouched && notifs.length === 1) { notifs[0].text = DEF[langNow()]; renderList(); restart(); }
  }, 0));
  renderList();

  // ---- Descarga: captura el canvas un ciclo ----
  function saveBlob(blob, name) {
    const u = URL.createObjectURL(blob); const a = document.createElement("a");
    a.href = u; a.download = name; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(u), 8000);
  }
  window.__lockDownload = async function () {
    // 1) MP4 real con WebCodecs (renderiza un ciclo fotograma a fotograma).
    if (window.mp4Support && window.mp4Support()) {
      const enc = await window.makeMp4Encoder(W, H, 30, 12000000);
      if (enc) {
        try {
          encoding = true;
          const FPS = 30, total = Math.round(CYCLE * FPS);
          for (let i = 0; i < total; i++) { render(i / FPS); await enc.addFrame(canvas, i * 1e6 / FPS, i % 60 === 0); }
          const blob = await enc.finish();
          encoding = false;
          if (blob.size >= 1000) { saveBlob(blob, "rhabit-pantalla-bloqueo.mp4"); return; }
        } catch (e) { encoding = false; }
      }
    }
    // 2) Fallback: MediaRecorder (captura el canvas en vivo un ciclo).
    return new Promise((resolve, reject) => {
      const cands = ["video/mp4;codecs=avc1.640028", "video/mp4;codecs=avc1", "video/mp4;codecs=h264", "video/mp4", "video/webm;codecs=vp9", "video/webm;codecs=vp8", "video/webm"];
      const mime = window.MediaRecorder && cands.find((t) => MediaRecorder.isTypeSupported(t));
      if (!mime) { reject(new Error("MediaRecorder no soportado")); return; }
      const ext = mime.indexOf("mp4") >= 0 ? "mp4" : "webm";
      const rec = new MediaRecorder(canvas.captureStream(30), { mimeType: mime, videoBitsPerSecond: 12000000 });
      const chunks = [];
      rec.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
      rec.onstop = () => {
        const blob = new Blob(chunks, { type: mime.split(";")[0] });
        if (blob.size < 1000) { reject(new Error("grabación vacía")); return; }
        saveBlob(blob, `rhabit-pantalla-bloqueo.${ext}`);
        resolve();
      };
      restart(); rec.start();
      setTimeout(() => { if (rec.state !== "inactive") rec.stop(); }, CYCLE * 1000 + 120);
    });
  };
})();

</script>
<script>
  document.getElementById("dl").addEventListener("click", async (e) => {
    const b = e.currentTarget, prev = b.innerHTML; b.disabled = true; b.textContent = "Generando…";
    try { if (window.__lockDownload) await window.__lockDownload(); }
    catch (err) { alert("No se pudo generar el vídeo en este navegador."); }
    finally { b.disabled = false; b.innerHTML = prev; }
  });
  document.querySelectorAll("#mk-lang button").forEach((btn) => btn.addEventListener("click", () => {
    document.querySelectorAll("#mk-lang button").forEach((x) => x.classList.toggle("on", x === btn));
  }));
</script>
